name: desktop-build

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  desktop-linux:
    name: Desktop Build (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (AppImage)
        run: pnpm --dir frontend_app tauri:build

      - name: Find Linux artifacts
        id: linux_paths
        run: |
          echo "appimage_path=$(ls desktop/src-tauri/target/release/bundle/appimage/*.AppImage)" >> $GITHUB_OUTPUT
          echo "binary_path=desktop/src-tauri/target/release/MindMapVault" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksums (Linux)
        run: |
          cd desktop/src-tauri/target/release
          sha256sum MindMapVault > MindMapVault.sha256
          sha256sum bundle/appimage/*.AppImage > MindMapVault.AppImage.sha256

      - name: Upload Linux AppImage to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.linux_paths.outputs.appimage_path }}
          asset_name: MindMapVault-Linux.AppImage
          asset_content_type: application/octet-stream

      - name: Upload Linux checksum to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: desktop/src-tauri/target/release/MindMapVault.AppImage.sha256
          asset_name: MindMapVault-Linux.AppImage.sha256
          asset_content_type: text/plain


  desktop-windows:
    name: Desktop Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (NSIS + EXE)
        run: pnpm --dir frontend_app tauri:build

      - name: Find Windows artifacts
        id: win_paths
        shell: powershell
        run: |
          $exe = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Generate SHA256 checksums (Windows)
        shell: powershell
        run: |
          cd desktop/src-tauri/target/release
          Get-FileHash MindMapVault.exe -Algorithm SHA256 | Out-File MindMapVault.exe.sha256
          Get-FileHash bundle/nsis/*.exe -Algorithm SHA256 | Out-File MindMapVault.nsis.sha256

      - name: Upload Windows EXE to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.win_paths.outputs.exe_path }}
          asset_name: MindMapVault-Windows.exe
          asset_content_type: application/octet-stream

      - name: Upload Windows checksum to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: desktop/src-tauri/target/release/MindMapVault.nsis.sha256
          asset_name: MindMapVault-Windows.exe.sha256
          asset_content_type: text/plain
