name: desktop-build

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  desktop-linux:
    name: Desktop Build (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (AppImage)
        run: pnpm --dir frontend_app tauri:build

      - name: Find Linux artifacts
        id: linux_paths
        run: |
          APPIMAGE_PATH=$(find desktop/src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "AppImage artifact not found" >&2
            exit 1
          fi
          CHECKSUM_PATH="${APPIMAGE_PATH}.sha256"
          echo "appimage_path=$APPIMAGE_PATH" >> $GITHUB_OUTPUT
          echo "appimage_checksum_path=$CHECKSUM_PATH" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksums (Linux)
        run: |
          APPIMAGE_PATH='${{ steps.linux_paths.outputs.appimage_path }}'
          CHECKSUM_PATH='${{ steps.linux_paths.outputs.appimage_checksum_path }}'
          sha256sum "$APPIMAGE_PATH" > "$CHECKSUM_PATH"

      - name: Upload Linux artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload '${{ github.event.release.tag_name }}' \
            '${{ steps.linux_paths.outputs.appimage_path }}#MindMapVault-Linux.AppImage' \
            '${{ steps.linux_paths.outputs.appimage_checksum_path }}#MindMapVault-Linux.AppImage.sha256' \
            --clobber


  desktop-windows:
    name: Desktop Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm (Corepack)
        shell: powershell
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (NSIS + EXE)
        run: pnpm --dir frontend_app tauri:build

      - name: Find Windows artifacts
        id: win_paths
        shell: powershell
        run: |
          $exe = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $exe) {
            throw "Windows NSIS installer artifact not found"
          }
          $checksumPath = "$($exe.FullName).sha256"
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "exe_checksum_path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Generate SHA256 checksums (Windows)
        shell: powershell
        run: |
          $exePath = "${{ steps.win_paths.outputs.exe_path }}"
          $checksumPath = "${{ steps.win_paths.outputs.exe_checksum_path }}"
          $hash = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash.ToLower()
          "$hash  $(Split-Path -Path $exePath -Leaf)" | Out-File -FilePath $checksumPath -Encoding ascii

      - name: Upload Windows artifacts to release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload '${{ github.event.release.tag_name }}' `
            '${{ steps.win_paths.outputs.exe_path }}#MindMapVault-Windows.exe' `
            '${{ steps.win_paths.outputs.exe_checksum_path }}#MindMapVault-Windows.exe.sha256' `
            --clobber
