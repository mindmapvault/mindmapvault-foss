name: desktop-build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-linux:
    name: Desktop Build (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (AppImage)
        run: pnpm --dir frontend_app tauri:build

      - name: Upload Linux bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-bundles
          path: |
            desktop/src-tauri/target/release/MindMapVault
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  desktop-windows:
    name: Desktop Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (NSIS + EXE)
        run: pnpm --dir frontend_app tauri:build

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-bundles
          path: |
            desktop/src-tauri/target/release/MindMapVault.exe
            desktop/src-tauri/target/release/bundle/nsis/*.exe
