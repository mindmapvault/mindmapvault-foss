name: Frontend Offline Parity

on:
  pull_request:
    paths:
      - 'frontend_app/**'
      - 'scripts/check_frontend_offline_parity.mjs'
      - '.github/workflows/offline-parity.yml'
  push:
    branches: [ main ]
    paths:
      - 'frontend_app/**'
      - 'scripts/check_frontend_offline_parity.mjs'
      - '.github/workflows/offline-parity.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  offline-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FOSS
        uses: actions/checkout@v4

      - name: Check cross-repo PAT availability
        id: check-pat
        run: |
          if [ -n "$MMV_CROSS_REPO_PAT" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          MMV_CROSS_REPO_PAT: ${{ secrets.MMV_CROSS_REPO_PAT }}

      - name: Checkout Server counterpart (optional)
        id: checkout-server
        if: steps.check-pat.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: mindmapvault/mindmapvault-server
          path: server-repo
          token: ${{ secrets.MMV_CROSS_REPO_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run offline parity check (with server contract)
        if: steps.check-pat.outputs.available == 'true'
        run: node scripts/check_frontend_offline_parity.mjs --foss-root=. --server-root=server-repo

      - name: Run offline parity check (FOSS-only, no server contract)
        if: steps.check-pat.outputs.available == 'false'
        run: node scripts/check_frontend_offline_parity.mjs --foss-root=. --strict=false
